<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2026 Fantasy Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
width:100%;
min-height:100vh;
padding:15px;
background:#050816;
background-image:
radial-gradient(circle at top left,#0ea5e955,transparent 35%),
radial-gradient(circle at bottom right,#7d2cff55,transparent 35%);
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
}

/* Main Card */

.container{
width:100%;
max-width:430px;
padding:40px 25px;
border-radius:30px;
background:#0f172a;
border:1px solid rgba(255,255,255,0.08);
text-align:center;
box-shadow:0 10px 45px rgba(0,0,0,0.5);
}

/* Badge */

.badge{
display:inline-block;
padding:10px 20px;
background:#172554;
border-radius:50px;
color:#7dd3fc;
font-size:13px;
font-weight:600;
margin-bottom:28px;
}

/* Logo */

.logo-box{
display:flex;
justify-content:center;
margin-bottom:28px;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
background:white;
padding:8px;
border:5px solid rgba(255,255,255,0.12);
box-shadow:0 0 40px rgba(14,165,233,.5);
object-fit:cover;
}

/* Small Text */

.small-title{
font-size:20px;
font-weight:600;
color:#7dd3fc;
margin-bottom:14px;
letter-spacing:1px;
}

/* Main Title */

.main-title{
font-size:56px;
font-weight:800;
line-height:1;
color:white;
margin-bottom:20px;
}

.main-title span{
color:#38bdf8;
}

/* Description */

.description{
font-size:16px;
line-height:1.9;
color:#d1d5db;
margin-bottom:35px;
}

/* Button */

.telegram-btn{
display:block;
width:100%;
padding:18px;
border-radius:18px;
text-decoration:none;
font-size:20px;
font-weight:700;
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;
box-shadow:0 12px 30px rgba(14,165,233,.45);
transition:.3s;
}

.telegram-btn:hover{
transform:translateY(-3px);
}

/* Stats */

.stats{
display:flex;
gap:12px;
margin-top:35px;
}

.box{
flex:1;
padding:18px 10px;
background:#1e293b;
border-radius:18px;
}

.box h3{
font-size:28px;
font-weight:700;
color:white;
}

.box p{
font-size:13px;
color:#94a3b8;
margin-top:5px;
}

/* Footer */

.footer{
margin-top:30px;
font-size:13px;
color:#94a3b8;
}

/* Mobile */

@media(max-width:480px){

.main-title{
font-size:44px;
}

.logo{
width:120px;
height:120px;
}

.telegram-btn{
font-size:18px;
padding:16px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="badge">
🏏 IPL 2026 Fantasy Hub
</div>

<div class="logo-box">
<img 
src="https://i.ibb.co/Kj5qBRgq/IMG-3879.jpg"
alt="IPL Logo"
class="logo"
>
</div>

<div class="small-title">
FREE TEAMS
</div>

<div class="main-title">
IPL <span>2026</span>
</div>

<div class="description">
Get daily fantasy teams, winning predictions,
match updates & premium cricket content.
</div>

<a 
href="https://t.me/+rQtloA-9JetiZmQ1"
target="_blank"
class="telegram-btn"
>
🚀 Join Free Telegram
</a>

<div class="stats">

<div class="box">
<h3>10K+</h3>
<p>Members</p>
</div>

<div class="box">
<h3>Daily</h3>
<p>Tips</p>
</div>

<div class="box">
<h3>100%</h3>
<p>Free</p>
</div>

</div>

<div class="footer">
#IPL2026 • Fantasy Cricket Community
</div>

</div>

</body>
</html>
